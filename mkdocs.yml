site_name: InstantLink
site_description: Open-source Rust CLI and macOS 15+ app for Fujifilm Instax Link printers via BLE
site_url: https://instantlink.hongjunwu.com/
repo_url: https://github.com/wu-hongjun/InstantLink
repo_name: wu-hongjun/InstantLink

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Reference:
      - CLI: reference/cli.md
      - Protocol: reference/protocol.md
      - FFI: reference/ffi.md
      - Bridge Sync API: reference/sync-api.md
  - Development:
      - Architecture: development/architecture.md
      - Bridge Firmware Release: development/bridge-firmware-release.md
      - Contributing: development/contributing.md
      - Reverse Engineering: development/reverse-engineering.md
  - Plans:
